[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read", path = "../circuits-baseline/proofs/" },
  { access = "read-write", path = "./deployments/" },
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[profile.default.fuzz]
runs = 256
