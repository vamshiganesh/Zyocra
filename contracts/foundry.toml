[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read", path = "../circuits-baseline/" },
  { access = "read", path = "../circuits-custom/" },
  { access = "read", path = "../benchmarks/" },
  { access = "read-write", path = "./deployments/" },
]

remappings = [
  "circuits-custom/=../circuits-custom/",
]

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[profile.default.fuzz]
runs = 256
